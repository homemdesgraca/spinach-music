<!DOCTYPE html>
<html>
    <head>

        <title>Spinach Music</title>
        <script>
            (() => {
                try {
                    const coverTheme = JSON.parse(localStorage.getItem('spinachMusic.coverBackground') || 'null');

                    if (!coverTheme?.url) {
                        return;
                    }

                    if (coverTheme.colors) {
                        Object.entries(coverTheme.colors).forEach(([property, value]) => {
                            document.documentElement.style.setProperty(property, value);
                        });
                    } else if (coverTheme.pageBg) {
                        document.documentElement.style.setProperty('--color-page-bg', coverTheme.pageBg);
                    }

                    if (coverTheme.colors?.['--color-page-bg'] || coverTheme.pageBg) {
                        document.documentElement.style.backgroundColor = coverTheme.colors?.['--color-page-bg'] || coverTheme.pageBg;
                    }

                    document.documentElement.style.setProperty('--cover-bg', `url("${coverTheme.url}")`);
                    document.documentElement.style.setProperty('--cover-bg-opacity', '0');
                    document.documentElement.style.setProperty('--cover-bg-scale', '1.045');
                    document.documentElement.style.setProperty('--cover-readable-overlay', coverTheme.overlay || 'transparent');
                    document.documentElement.classList.add('has-cover-theme');

                    const revealCover = () => {
                        requestAnimationFrame(() => {
                            document.documentElement.style.setProperty('--cover-bg-opacity', '1');
                            document.documentElement.style.setProperty('--cover-bg-scale', '1');
                        });
                    };
                    const preload = new Image();
                    let revealed = false;
                    const safeReveal = () => {
                        if (revealed) {
                            return;
                        }
                        revealed = true;
                        revealCover();
                    };

                    preload.onload = safeReveal;
                    preload.onerror = safeReveal;
                    preload.src = coverTheme.url;
                    preload.decode?.().then(safeReveal).catch(() => {});
                    window.setTimeout(safeReveal, 1600);
                } catch {}
            })();
        </script>
        <link rel="stylesheet" href="styles.css">
        <link rel="stylesheet" href="config-menu.css">
        <link rel="stylesheet" href="connections-panel.css">

    </head>

    <body>
        <div class="config-menu">
            <button class="config-btn" aria-label="Open settings" aria-expanded="false">⚙</button>
            <button class="config-card theme-btn" type="button">theme</button>
            <button class="config-card">sound</button>
            <button class="config-card connections-btn" type="button">connections</button>
            <button class="config-card">about</button>
        </div>

        <section class="theme-panel" aria-hidden="true">
            <button class="theme-close" type="button">close</button>
            <h2>theme</h2>
            <div class="theme-card">
                <p>cover colors</p>
                <button class="theme-toggle" id="cover-theme-toggle" type="button" aria-pressed="false">on</button>
            </div>
        </section>

        <section class="connections-panel" aria-hidden="true">
            <button class="panel-close" type="button">close</button>
            <h2>
                connections
                <span class="wifi-loop" aria-hidden="true">
                    <span></span>
                    <span></span>
                    <span></span>
                </span>
            </h2>
            <div class="connection-card">
                <h3>Navidrome / Subsonic</h3>
                <label>
                    server url
                    <input id="navidrome-url" type="text" placeholder="http://127.0.0.1:4533/" value="http://127.0.0.1:4533/">
                </label>
                <label>
                    username
                    <input id="navidrome-user" type="text" placeholder="your username">
                </label>
                <label>
                    password
                    <input id="navidrome-pass" type="password" placeholder="your password">
                </label>
                <button class="connection-connect" id="navidrome-connect" type="button">connect</button>
                <p class="connection-status navidrome-status" id="navidrome-status" aria-live="polite"></p>
            </div>
        </section>

        <div class="top-section">
            <h1 class="title-txt">spinach music</h1>
            <p class="subtitle-txt">music is life</p>
        </div>

        <nav class="library-tabs" aria-label="library sections">
            <button class="library-tab" type="button" data-library-tab="artists" aria-selected="false">artists</button>
            <button class="library-tab" type="button" data-library-tab="albums" aria-selected="false">albums</button>
        </nav>

        <section class="library-deck" aria-label="library preview deck" aria-hidden="true">
            <div class="library-deck-track" data-library-deck-track></div>
        </section>

        <aside class="lyrics-drawer" aria-hidden="true">
            <button class="lyrics-tab" type="button" aria-expanded="false" aria-label="open lyrics">lyrics</button>
            <div class="lyrics-card">
                <button class="lyrics-close" type="button">close</button>
                <p class="lyrics-kicker">current song</p>
                <h2>lyrics</h2>
                <p class="lyrics-status" id="lyrics-status">tap the card to fetch lyrics</p>
                <div class="lyrics-lines" id="lyrics-lines" aria-live="polite"></div>
            </div>
        </aside>

        <section class="now-playing-bar is-empty" aria-label="Current playing song">
            <button class="cover-theme-button" type="button" aria-label="use cover as theme">
                <img id="now-playing-cover" alt="" aria-hidden="true">
            </button>
            <span class="now-playing-copy">
                <span class="now-playing-title-line">
                    <span id="now-playing-title">nothing playing</span>
                </span>
                <span class="now-playing-album-line">
                    <span id="now-playing-album"></span>
                </span>
                <span class="now-playing-artist-line">
                    <span id="now-playing-artist"></span>
                </span>
            </span>
            <span class="now-playing-disc" aria-hidden="true">
                <span class="now-playing-face">:&lt;</span>
            </span>
            <div class="player-controls" aria-label="Player controls">
                <button class="player-control" type="button" data-mpris-action="previous">back</button>
                <button class="player-control" type="button" data-mpris-action="toggle" aria-pressed="false">play</button>
                <button class="player-control" type="button" data-mpris-action="next">next</button>
            </div>
            <div class="player-progress-pill" aria-label="Song progress">
                <span class="progress-time-bubble" id="progress-time-bubble">0:00</span>
                <input id="now-playing-progress" type="range" min="0" max="100" value="0" step="1" aria-label="song progress">
            </div>
            <section class="now-playing-status-pill" aria-label="Now playing update status">
                <span id="now-playing-timer">next check in 3s</span>
            </section>
        </section>

        <script src="menu.js"></script>
        <script src="navidrome.js?v=10"></script>
        <script src="library-tabs.js?v=16"></script>
        <script src="now-playing.js?v=41"></script>
    </body>

</html>
